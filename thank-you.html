<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — LifeScienceForce</title>
  <meta name="robots" content="noindex, nofollow">

  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">

  <style>
    .thankyou {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-12) var(--space-6);
    }
    .thankyou-content {
      max-width: 480px;
    }
    .thankyou-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--space-8);
      background: var(--color-secondary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .thankyou-icon svg {
      color: var(--color-secondary);
    }
    .thankyou h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: var(--space-4);
    }
    .thankyou p {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: var(--space-8);
      max-width: 100%;
    }
    .thankyou .btn-primary {
      display: inline-flex;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="./index.html" class="logo" aria-label="LifeScienceForce home">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="20" cy="20" r="18" stroke="var(--color-primary)" stroke-width="2" opacity="0.2"/>
          <path d="M20 8 L28 14 L28 26 L20 32 L12 26 L12 14 Z" stroke="var(--color-primary)" stroke-width="1.5" fill="none"/>
          <circle cx="20" cy="8" r="2.5" fill="var(--color-primary)"/>
          <circle cx="28" cy="14" r="2.5" fill="var(--color-secondary)"/>
          <circle cx="28" cy="26" r="2.5" fill="var(--color-primary)"/>
          <circle cx="20" cy="32" r="2.5" fill="var(--color-secondary)"/>
          <circle cx="12" cy="26" r="2.5" fill="var(--color-primary)"/>
          <circle cx="12" cy="14" r="2.5" fill="var(--color-secondary)"/>
          <circle cx="20" cy="20" r="3" fill="var(--color-primary)"/>
        </svg>
        <span class="logo-text">Life<span>Science</span>Force</span>
      </a>
    </div>
  </header>

  <main>
    <section class="thankyou">
      <div class="thankyou-content">
        <div class="thankyou-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h1>Thank You</h1>
        <p>Your message has been received. A member of our team will review your inquiry and get back to you shortly.</p>
        <a href="./index.html" class="btn-primary">
          Back to Home
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; margin-top: 0; padding-top: 0;">
        <p>&copy; 2026 LifeScienceForce by StratusG Consulting. All rights reserved.</p>

      </div>
    </div>
  </footer>

  <script>
    (function(){
      const r = document.documentElement;
      let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', d);
    })();
  </script>
</body>
</html>
